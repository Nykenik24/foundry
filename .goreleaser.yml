version: 2

project_name: foundry

builds:
  - main: ./main.go
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    flags:
      - -ldflags="-s -w -X main.version={{ .Version }} -X main.commit={{ .Commit }}"

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - ./*

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  github:
    owner: Nykenik24
    name: foundry
  footer: >-
    ---
    Released by [GoReleaser](https://github.com/goreleaser/goreleaser).

source:
  enabled: true

sboms:
  - artifacts: archive
